<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Nika</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            /* Глубокий черный фон с мягким виниловым свечением */
            background: radial-gradient(circle, #200005 0%, #000 100%); 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener("resize", resize);
        resize();

        let angle = 0;
        const NUM_STEPS = 80;  // Оптимальная плотность текста
        const SCALE = 13;      // Размер сердца под экран телефона
        const TEXT = "НИКА Я ТЕБЯ ЛЮБЛЮ";

        function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
        function heartY(t) { return 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t); }

        function draw() {
            // Очистка с эффектом затухания для плавности
            ctx.fillStyle = "rgba(0, 0, 0, 0.15)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // Стиль текста
            ctx.font = "bold 14px 'Segoe UI', Arial, sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            for (let i = 0; i < NUM_STEPS; i++) {
                // Математика твоего кода с добавлением динамики
                const t = (i / NUM_STEPS) * Math.PI * 2;
                const x = cx + heartX(t) * SCALE * (1 + Math.sin(angle) * 0.05); // Эффект биения
                const y = cy - heartY(t) * SCALE * (1 + Math.sin(angle) * 0.05);

                // Цвет плавно переливается от розового к алому
                const hue = 345 + Math.sin(angle + i * 0.1) * 15;
                ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
                
                // Неоновое свечение букв
                ctx.shadowBlur = 12;
                ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;

                ctx.fillText(TEXT, x, y);
            }

            angle += 0.03; // Скорость анимации
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
