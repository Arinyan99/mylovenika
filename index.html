<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Ники</title>
    <style>
        body { 
            margin: 0; 
            background-color: #ffc0cb; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Контейнеры */
        #heartStage, #ballStage {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #ballStage {
            display: none;
            opacity: 0;
            transition: opacity 1s ease-in;
        }

        /* ГИПЕРРЕАЛИСТИЧНЫЙ ШАР */
        .ball-container {
            position: relative;
            width: 320px;
            height: 320px;
            animation: levitate 4s ease-in-out infinite;
        }

        .magic-ball {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 35% 35%, 
                #ff7b92 0%, 
                #e60026 30%, 
                #8b001a 70%, 
                #4d000e 100%);
            border-radius: 50%;
            position: relative;
            box-shadow: 
                0 50px 100px rgba(0,0,0,0.5), 
                inset -25px -25px 60px rgba(0,0,0,0.8),
                inset 20px 20px 50px rgba(255,255,255,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
        }

        /* Стеклянный блик */
        .glass-glare {
            position: absolute;
            top: 10%;
            left: 15%;
            width: 120px;
            height: 60px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(255,255,255,0));
            border-radius: 50%;
            transform: rotate(-25deg);
            filter: blur(8px);
            pointer-events: none;
            z-index: 3;
        }

        .magic-ball:active { transform: scale(0.92); }

        .ball-window {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px;
            box-sizing: border-box;
            border: 6px solid #111;
            box-shadow: inset 0 0 40px rgba(0,0,0,1);
        }

        #predictionText {
            color: #ffcad4;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            line-height: 1.4;
            text-shadow: 0 0 10px rgba(255,170,180,0.6);
            transition: opacity 0.4s;
        }

        .hint { 
            margin-top: 40px; 
            color: #b3001e; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
        }

        @keyframes levitate {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <div id="heartStage">
        <canvas id="heartCanvas"></canvas>
    </div>

    <div id="ballStage">
        <div class="ball-container">
            <div class="glass-glare"></div>
            <div class="magic-ball" onclick="shakeBall()">
                <div class="ball-window">
                    <div id="predictionText">Никуся, нажми на шар</div>
                </div>
            </div>
        </div>
        <p class="hint">Узнай мои мысли о тебе</p>
    </div>
