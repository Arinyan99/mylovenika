<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Ники</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            /* Мягкий розово-черный фон */
            background: radial-gradient(circle, #2b0010 0%, #000 100%); 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        canvas { display: block; filter: drop-shadow(0 0 10px rgba(255, 20, 147, 0.5)); }
    </style>
</head>
<body>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let angle = 0;
        const NUM_STEPS = 100; // Больше шагов = плотнее сердце
        const SCALE = 15;      // Размер сердца
        const TEXT = "Ника, я тебя люблю";

        function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
        function heartY(t) { return 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t); }

        function draw() {
            // Очищаем экран с небольшим шлейфом
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // Настройка текста
            ctx.font = "bold 16px 'Segoe UI', Arial, sans-serif";
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            for (let i = 0; i < NUM_STEPS; i++) {
                const t = (i / NUM_STEPS) * Math.PI * 2 + angle;
                const x = cx + heartX(t) * SCALE;
                const y = cy - heartY(t) * SCALE;

                // Делаем цвет переливающимся (от розового к красному)
                const hue = 340 + Math.sin(angle + i * 0.1) * 20;
                ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
                
                // Добавляем свечение буквам
                ctx.shadowBlur = 15;
                ctx.shadowColor = `hsl(${hue}, 100%, 50%)`;

                ctx.fillText(TEXT, x, y);
            }

            angle += 0.01; // Скорость вращения/движения
            requestAnimationFrame(draw);
        }

        window.addEventListener("resize", () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        draw();
    </script>
</body>
</html>
