<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Ники</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #ffc0cb; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #heartStage, #ballStage { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #ballStage { display: none; opacity: 0; transition: opacity 1.5s ease; }
        #three-container { width: 100vw; height: 100vh; position: relative; cursor: pointer; }
        
        /* Текст внутри 3D облака */
        #prediction-overlay {
            position: absolute;
            top: 25%;
            left: 65%;
            transform: translate(-50%, -50%);
            width: 250px;
            pointer-events: none;
            z-index: 10;
        }

        #prediction-text {
            color: #004a7c;
            font-size: 18px;
            font-weight: 800;
            text-align: center;
            line-height: 1.4;
            opacity: 0;
            filter: blur(10px);
            transition: all 1.5s ease;
        }

        #prediction-text.visible {
            opacity: 1;
            filter: blur(0px);
        }

        .hint { 
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: #b3001e; 
            font-weight: 900; 
            text-transform: uppercase; 
            font-size: 12px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="heartStage">
        <canvas id="heartCanvas"></canvas>
    </div>

    <div id="ballStage">
        <div id="three-container">
            <div id="prediction-overlay">
                <div id="prediction-text">Никуся...</div>
            </div>
        </div>
        <p class="hint">Коснись шара, чтобы увидеть мысли</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const phrases = [
            "Никусь, ты самая шикарная)",
            "Никусь, ты самая самая красивая",
            "Дорогая моя Вероника, ты самая лучшая в мире",
            "Никуся, ты сегодня лучше, чем вчера, а завтра будешь лучше, чем сегодня)",
            "Ника, ты прям сияешь",
            "Никуся, лучше тебя никого не бывает",
            "Улыбайся почаще, моя дорогая",
            "Никуся, ты самая идеальная в мире",
            "Никуся, ты прям как космос - это выше небес",
            "Никуся, ты бесценна"
        ];

        // --- ЛОГИКА СЕРДЦА ---
        const hCanvas = document.getElementById('heartCanvas');
        const hCtx = hCanvas.getContext('2d');
        let hWidth = hCanvas.width = window.innerWidth;
        let hHeight = hCanvas.height = window.innerHeight;

        function getHeartPoint(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x: x * 15, y: -y * 15 };
        }

        class HeartParticle {
            constructor(t) {
                this.t = t;
                this.x = Math.random() * hWidth;
                this.y = Math.random() * hHeight;
                const target = getHeartPoint(this.t);
                this.targetX = target.x + hWidth / 2;
                this.targetY = target.y + hHeight / 2;
                this.speed = 0.01 + Math.random() * 0.02;
            }
            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
            }
            draw() {
                hCtx.font = "bold 14px sans-serif";
                hCtx.fillStyle = "#ff0000";
                hCtx.fillText("Ника, я тебя люблю", this.x, this.y);
            }
        }

        const particles = [];
        for (let i = 0; i < 100; i++) particles.push(new HeartParticle((i / 100) * Math.PI * 2));

        function animateHeart() {
            if (document.getElementById('heartStage').style.display === 'none') return;
            hCtx.fillStyle = "#ffc0cb";
            hCtx.fillRect(0, 0, hWidth, hHeight);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateHeart);
        }
        animateHeart();

        setTimeout(() => {
            const hStage = document.getElementById('heartStage');
            const bStage = document.getElementById('ballStage');
            hStage.style.opacity = '0';
            setTimeout(() => {
                hStage.style.display = 'none';
                bStage.style.display = 'flex';
                setTimeout(() => { bStage.style.opacity = '1'; init3DScene(); }, 50);
            }, 1000);
        }, 5000);

        // --- 3D МАГИЯ ---
        function init3DScene() {
            const container = document.getElementById('three-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            container.appendChild(renderer.domElement);

            // 1. МАГИЧЕСКИЙ ШАР
            const ballGroup = new THREE.Group();
            const ballGeom = new THREE.SphereGeometry(1.5, 64, 64);
            const ballMat = new THREE.MeshPhongMaterial({
                color: 0x800000,
                specular: 0xffffff,
                shininess: 100,
                emissive: 0x330000
            });
            const ball = new THREE.Mesh(ballGeom, ballMat);
            ballGroup.add(ball);
            scene.add(ballGroup);

            // 2. 3D ОБЛАКО (Бело-голубое)
            const cloudGroup = new THREE.Group();
            const cloudMat = new THREE.MeshLambertMaterial({
                color: 0xe0f7ff,
                transparent: true,
                opacity: 0, // Изначально невидимо
                emissive: 0x112233
            });

            // Создаем форму из сфер
            const spheres = [
                { r: 0.8, x: 0, y: 0, z: 0 },
                { r: 0.6, x: 0.7, y: 0.2, z: 0 },
                { r: 0.6, x: -0.7, y: 0.1, z: 0 },
                { r: 0.5, x: 0.3, y: -0.4, z: 0.2 },
                { r: 0.5, x: -0.4, y: 0.4, z: -0.1 }
            ];

            spheres.forEach(s => {
                const g = new THREE.SphereGeometry(s.r, 32, 32);
                const m = new THREE.Mesh(g, cloudMat);
                m.position.set(s.x, s.y, s.z);
                cloudGroup.add(m);
            });

            cloudGroup.position.set(3, 2, 0); // Справа-сверху
            cloudGroup.scale.set(0.1, 0.1, 0.1); // Для анимации появления
            scene.add(cloudGroup);

            // Свет
            const sun = new THREE.DirectionalLight(0xffffff, 1);
            sun.position.set(5, 5, 5);
            scene.add(sun);
            scene.add(new THREE.AmbientLight(0x404040, 0.8));

            camera.position.z = 8;

            // Анимация
            function animate() {
                requestAnimationFrame(animate);
                ballGroup.rotation.y += 0.005;
                
                // Мягкое покачивание облака
                cloudGroup.position.y = 2 + Math.sin(Date.now() * 0.001) * 0.1;
                cloudGroup.position.x = 3 + Math.cos(Date.now() * 0.0015) * 0.05;
                cloudGroup.rotation.z = Math.sin(Date.now() * 0.0005) * 0.05;

                renderer.render(scene, camera);
            }
            animate();

            // Взаимодействие
            let isAnimating = false;
            container.onclick = () => {
                if (isAnimating) return;
                isAnimating = true;

                const textElem = document.getElementById('prediction-text');
                textElem.classList.remove('visible');

                // 1. Плавная вибрация шара
                let start = Date.now();
                function shakeBall() {
                    let elapsed = Date.now() - start;
                    if (elapsed < 1000) {
                        const intensity = (1000 - elapsed) / 1000; // Затухание
                        ballGroup.position.x = Math.sin(elapsed * 0.05) * 0.15 * intensity;
                        ballGroup.position.y = Math.cos(elapsed * 0.06) * 0.1 * intensity;
                        requestAnimationFrame(shakeBall);
                    } else {
                        ballGroup.position.set(0, 0, 0);
                        showCloud();
                    }
                }

                function showCloud() {
                    // 2. Плавное появление облака
                    let cloudStart = Date.now();
                    function expand() {
                        let e = Date.now() - cloudStart;
                        if (e < 1200) {
                            let progress = e / 1200;
                            cloudMat.opacity = progress * 0.9;
                            let s = 0.1 + progress * 1.4;
                            cloudGroup.scale.set(s, s, s);
                            requestAnimationFrame(expand);
                        } else {
                            textElem.innerText = phrases[Math.floor(Math.random() * phrases.length)];
                            textElem.classList.add('visible');
                            isAnimating = false;
                        }
                    }
                    expand();
                }

                shakeBall();
            };
        }

        window.onresize = () => {
            location.reload(); // Простой способ обновить размеры канваса
        };
    </script>
</body>
</html>
