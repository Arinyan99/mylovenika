<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Ники</title>
    <style>
        body { margin: 0; background: #000; overflow: hidden; display: flex; justify-content: center; align-items: center; height: 100vh; }
        canvas { position: absolute; top: 0; left: 0; }
        .msg { color: #ff0032; font-family: 'Arial', sans-serif; font-size: 24px; z-index: 10; pointer-events: none; text-shadow: 0 0 15px #ff0032; text-align: center; max-width: 80%; }
    </style>
</head>
<body>
    <div class="msg">Ника, я тебя люблю</div>
    <canvas id="heart"></canvas>

    <script>
        const canvas = document.getElementById('heart');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const points = [];
        const words = ['Ника', 'любовь', 'моя', 'навсегда', 'солнце', 'космос', 'рядом', 'ты', 'сердце', 'я'];

        // Форма сердца
        function getHeartPoint(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            // Масштабируем
            return { x: x * 15, y: -y * 15 };
        }

        class Particle {
            constructor() {
                // Выбираем точку *внутри* сердца (а не на контуре)
                const t = Math.random() * Math.PI * 2;
                // randomizing distance from center within the heart contour
                const r = Math.sqrt(Math.random());
                const contour = getHeartPoint(t);
                
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.targetX = (contour.x * r) + width / 2;
                this.targetY = (contour.y * r) + height / 2;
                
                // СДЕЛАНО МЕДЛЕННЕЕ: скорость уменьшена
                this.speed = 0.005 + Math.random() * 0.01;
                
                this.word = words[Math.floor(Math.random() * words.length)];
                this.size = Math.random() * 8 + 6;
                // Немного прозрачности для мягкости
                this.opacity = Math.random() * 0.5 + 0.3; 
            }
            draw() {
                // Плавное движение
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
                
                // Рисуем слово
                ctx.fillStyle = `rgba(255, 0, 50, ${this.opacity})`; // чуть мягче цвет
                ctx.font = `${this.size}px Arial`;
                ctx.fillText(this.word, this.x, this.y);
            }
        }

        // Больше частиц, чтобы заполнить объем
        const particleCount = 450;
        for (let i = 0; i < particleCount; i++) points.push(new Particle());

        function animate() {
            // Оставляем длинный след для мягкости
            ctx.fillStyle = 'rgba(0, 0, 0, 0.03)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);
            points.forEach(p => p.draw());
            requestAnimationFrame(animate);
        }
        
        animate();
    </script>
</body>
</html>
