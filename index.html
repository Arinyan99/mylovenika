<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Ники</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            /* Чистый черный фон */
            background: #000;
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="heartTrail"></canvas>

    <script>
        const canvas = document.getElementById("heartTrail");
        const ctx = canvas.getContext("2d");

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }

        window.addEventListener("resize", resize);
        resize();

        let angle = 0;
        // 1. НАСТРОЙКИ: 1 в 1 как в том видео
        const NUM_STEPS = 85;   // Плотность текста
        const SCALE = 12;      // Размер сердца
        const TEXT = "НИКА Я ТЕБЯ ЛЮБЛЮ";
        const FONT_SIZE = 10;   // Тот самый, маленький

        // Классическая математическая формула сердца
        function heartX(t) { return 16 * Math.pow(Math.sin(t), 3); }
        function heartY(t) { return 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t); }

        function draw() {
            // КЛЮЧЕВОЕ ИЗМЕНЕНИЕ: НЕ очищаем холст полностью.
            // Вместо этого мы рисуем полупрозрачный черный прямоугольник, 
            // что заставляет старые слова *медленно затухать*, создавая шлейф.
            ctx.fillStyle = "rgba(0, 0, 0, 0.08)"; // Управляет длиной "хвоста"
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const cx = canvas.width / 2;
            const cy = canvas.height / 2;

            // 2. АУТЕНТИЧНЫЙ ШРИФТ: Жирный, простой Arial
            ctx.font = `bold ${FONT_SIZE}px Arial`;
            ctx.textAlign = "center";
            ctx.textBaseline = "middle";

            for (let i = 0; i < NUM_STEPS; i++) {
                // Математика ТикТока: слова вылетают и закручиваются
                const t = (i / NUM_STEPS) * Math.PI * 2 + angle;
                const x = cx + heartX(t) * SCALE;
                const y = cy - heartY(t) * SCALE;

                // ЦВЕТ: Насыщенный красный с мерцанием
                const hue = 345 + Math.sin(angle * 2 + i * 0.2) * 10;
                
                // Прозрачность затухает по мере движения шлейфа
                const opacity = 1 - (i / NUM_STEPS);
                
                ctx.fillStyle = `hsla(${hue}, 100%, 55%, ${opacity})`;
                
                // 3. МЯГКОЕ НЕОНОВОЕ СВЕЧЕНИЕ (не каша)
                ctx.shadowBlur = 8;
                ctx.shadowColor = `hsla(${hue}, 100%, 50%, ${opacity})`;

                ctx.fillText(TEXT, x, y);
            }

            // Скорость "летящего" эффекта
            angle += 0.025; 
            requestAnimationFrame(draw);
        }

        draw();
    </script>
</body>
</html>
