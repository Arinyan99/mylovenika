<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Для Ники</title>
    <style>
        canvas {
            position: absolute;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
        }
    </style>
</head>
<body>
    <canvas id="heart"></canvas>
    <script>
        const canvas = document.getElementById('heart');
        const ctx = canvas.getContext('2d');
        
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        // Конфиг как в оригинале
        const settings = {
            particles: 600, // Количество слов
            text: "НИКА Я ТЕБЯ ЛЮБЛЮ",
            heartSize: 15,
            speed: 0.03
        };

        function getHeartPoint(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3),
                y: -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t))
            };
        }

        class Particle {
            constructor() {
                this.reset();
            }
            reset() {
                this.t = Math.random() * Math.PI * 2;
                this.distance = Math.sqrt(Math.random()); // Чтобы заполнять всё сердце, а не только контур
                this.speed = Math.random() * settings.speed + 0.01;
                this.size = Math.random() * 3 + 8;
                this.opacity = Math.random() * 0.5 + 0.5;
            }
            draw() {
                const pos = getHeartPoint(this.t);
                // Эффект биения (пульсация)
                const pulse = 1 + 0.15 * Math.sin(Date.now() * 0.003);
                
                const x = width / 2 + pos.x * settings.heartSize * pulse * this.distance;
                const y = height / 2 + pos.y * settings.heartSize * pulse * this.distance;

                ctx.font = `bold ${this.size}px Arial`;
                ctx.fillStyle = `rgba(255, 0, 80, ${this.opacity})`;
                ctx.shadowBlur = 5;
                ctx.shadowColor = "red";
                ctx.fillText(settings.text, x, y);

                // Движение слов внутри
                this.t += this.speed * 0.1;
            }
        }

        const particles = [];
        for (let i = 0; i < settings.particles; i++) {
            particles.push(new Particle());
        }

        function render() {
            // Эффект шлейфа (черная заливка с прозрачностью)
            ctx.fillStyle = "rgba(0, 0, 0, 0.1)";
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => p.draw());
            requestAnimationFrame(render);
        }

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        render();
    </script>
</body>
</html>
