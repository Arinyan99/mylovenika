<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <title>Для Ники</title>
    <style>
        canvas { position: absolute; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,1); }
    </style>
</head>
<body>
    <canvas id="heart"></canvas>
    <script>
        window.requestAnimationFrame = window.requestAnimationFrame || window.mozRequestAnimationFrame || window.webkitRequestAnimationFrame || window.msRequestAnimationFrame;

        const config = {
            particleCount: 600, // Плотность
            text: "НИКА Я ТЕБЯ ЛЮБЛЮ",
            heartSize: 13,
            traceCount: 20
        };

        const canvas = document.getElementById('heart');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        function heartPosition(t) {
            return {
                x: 16 * Math.pow(Math.sin(t), 3),
                y: -(13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t))
            };
        }

        class Particle {
            constructor() {
                this.t = Math.random() * Math.PI * 2;
                this.distance = Math.random();
                this.speed = Math.random() * 0.02 + 0.01;
                this.opacity = Math.random() * 0.5 + 0.5;
                this.size = Math.random() * 2 + 8;
            }
            draw() {
                const pos = heartPosition(this.t);
                // Плавное пульсирование
                const pulse = 1 + 0.1 * Math.sin(Date.now() * 0.003);
                const x = width / 2 + pos.x * config.heartSize * pulse * this.distance;
                const y = height / 2 + pos.y * config.heartSize * pulse * this.distance;

                ctx.font = `bold ${this.size}px Arial`;
                ctx.fillStyle = `rgba(255, 0, 50, ${this.opacity})`;
                ctx.shadowBlur = 5;
                ctx.shadowColor = "red";
                ctx.fillText(config.text, x, y);
            }
        }

        const particles = [];
        for (let i = 0; i < config.particleCount; i++) {
            particles.push(new Particle());
        }

        function loop() {
            // Эффект шлейфа через полупрозрачную заливку
            ctx.fillStyle = "rgba(0,0,0,0.15)";
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => p.draw());
            requestAnimationFrame(loop);
        }

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        loop();
    </script>
</body>
</html>
