<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Ники</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #ffc0cb; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #heartStage, #ballStage { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #ballStage { display: none; opacity: 0; transition: opacity 1.5s ease; flex-direction: column; }
        
        #three-container {
            width: 400px; 
            height: 400px; 
            position: relative; 
            cursor: pointer;
        }

        /* Та самая "строка" внутри шара */
        #prediction-line {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 220px; /* Ширина строки */
            height: 60px;  /* Высота строки */
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 100;
            overflow: hidden; /* Чтобы текст "выезжал" из ниоткуда */
        }

        #prediction-text {
            color: #ffffff;
            font-size: 16px;
            font-weight: 800;
            text-align: center;
            line-height: 1.2;
            text-shadow: 0 0 10px rgba(255, 100, 150, 0.8);
            
            /* Анимация выезда */
            opacity: 0;
            transform: translateY(20px);
            transition: all 0.8s cubic-bezier(0.23, 1, 0.32, 1);
        }

        #prediction-text.active {
            opacity: 1;
            transform: translateY(0);
        }

        .hint { 
            margin-top: 20px; 
            color: #b3001e; 
            font-weight: 900; 
            text-transform: uppercase; 
            font-size: 13px;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div id="heartStage">
        <canvas id="heartCanvas"></canvas>
    </div>

    <div id="ballStage">
        <div id="three-container">
            <div id="prediction-line">
                <div id="prediction-text"></div>
            </div>
        </div>
        <p class="hint">Нажми на шар, Никуся</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const phrases = [
            "Никусь, ты самая шикарная)",
            "Никусь, ты самая самая красивая",
            "Дорогая моя Вероника, ты самая лучшая в мире",
            "Никуся, ты сегодня лучше, чем вчера, а завтра будешь лучше, чем сегодня)",
            "Ника, ты прям сияешь",
            "Никуся, лучше тебя никого не бывает",
            "Улыбайся почаще, моя дорогая",
            "Никуся, ты самая идеальная в мире",
            "Никуся, ты прям как космос - это выше небес",
            "Никуся, ты бесценна"
        ];

        // --- СЕРДЦЕ (без изменений) ---
        const hCanvas = document.getElementById('heartCanvas');
        const hCtx = hCanvas.getContext('2d');
        let hWidth = hCanvas.width = window.innerWidth;
        let hHeight = hCanvas.height = window.innerHeight;
        function getHeartPoint(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x: x * 15, y: -y * 15 };
        }
        class Part {
            constructor(t) {
                this.t = t;
                this.x = Math.random() * hWidth; this.y = Math.random() * hHeight;
                const target = getHeartPoint(this.t);
                this.targetX = target.x + hWidth / 2; this.targetY = target.y + hHeight / 2;
                this.speed = 0.02;
            }
            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
            }
            draw() {
                hCtx.font = "bold 14px sans-serif"; hCtx.fillStyle = "#ff0000";
                hCtx.fillText("Ника, я тебя люблю", this.x, this.y);
            }
        }
        const particles = [];
        for (let i = 0; i < 100; i++) particles.push(new Part((i / 100) * Math.PI * 2));
        function animateHeart() {
            if (document.getElementById('heartStage').style.display === 'none') return;
            hCtx.fillStyle = "#ffc0cb"; hCtx.fillRect(0, 0, hWidth, hHeight);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateHeart);
        }
        animateHeart();

        setTimeout(() => {
            document.getElementById('heartStage').style.opacity = '0';
            setTimeout(() => {
                document.getElementById('heartStage').style.display = 'none';
                document.getElementById('ballStage').style.display = 'flex';
                document.getElementById('ballStage').style.opacity = '1';
                init3D();
            }, 1000);
        }, 5000);

        // --- 3D ШАР СО СТРОКОЙ ---
        function init3D() {
            const container = document.getElementById('three-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(400, 400);
            container.appendChild(renderer.domElement);

            const ballGroup = new THREE.Group();
            
            // Основное тело шара
            const ballGeom = new THREE.SphereGeometry(2, 64, 64);
            const ballMat = new THREE.MeshPhongMaterial({
                color: 0x8b0000,
                specular: 0xffffff,
                shininess: 100,
                emissive: 0x220000
            });
            const ball = new THREE.Mesh(ballGeom, ballMat);
            ballGroup.add(ball);

            // Визуальная "строка" (черное окошко)
            const lineGeom = new THREE.CylinderGeometry(1.1, 1.1, 0.7, 64, 1, true, 0, Math.PI);
            const lineMat = new THREE.MeshBasicMaterial({ color: 0x0a0a0a, side: THREE.DoubleSide });
            const windowLine = new THREE.Mesh(lineGeom, lineMat);
            windowLine.rotation.x = Math.PI / 2;
            windowLine.position.z = 1.0; 
            ballGroup.add(windowLine);

            scene.add(ballGroup);

            const light = new THREE.PointLight(0xffffff, 1.5);
            light.position.set(5, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040, 1));

            camera.position.z = 6;

            function animate() {
                requestAnimationFrame(animate);
                ballGroup.rotation.y = Math.sin(Date.now() * 0.001) * 0.1;
                renderer.render(scene, camera);
            }
            animate();

            container.onclick = () => {
                const textElem = document.getElementById('prediction-text');
                textElem.classList.remove('active');

                // Плавная встряска
                let start = Date.now();
                function shake() {
                    let elapsed = Date.now() - start;
                    if (elapsed < 600) {
                        ballGroup.position.x = Math.sin(elapsed * 0.1) * 0.05;
                        requestAnimationFrame(shake);
                    } else {
                        ballGroup.position.x = 0;
                        textElem.innerText = phrases[Math.floor(Math.random() * phrases.length)];
                        textElem.classList.add('active');
                    }
                }
                shake();
            };
        }
    </script>
</body>
</html>
