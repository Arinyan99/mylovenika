<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Nika</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;600&display=swap');
        
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; background-color: #050505; }
        
        canvas { position: absolute; top: 0; left: 0; }

        .content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            z-index: 10;
            pointer-events: none;
        }

        .title {
            font-family: 'Montserrat', sans-serif;
            color: white;
            font-size: 2.2rem;
            font-weight: 300;
            letter-spacing: 5px;
            text-transform: uppercase;
            text-shadow: 0 0 20px rgba(255, 20, 147, 0.8);
            margin-bottom: 10px;
        }

        .subtitle {
            font-family: 'Montserrat', sans-serif;
            color: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>

    <div class="content">
        <div class="title">Ника, люблю тебя</div>
        <div class="subtitle">ты — весь мой мир</div>
    </div>

    <canvas id="heart"></canvas>

    <script>
        const canvas = document.getElementById('heart');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const particles = [];
        const particleCount = 600;

        function getHeartPoint(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x: x * 15, y: -y * 15 };
        }

        class Particle {
            constructor() {
                this.reset();
            }

            reset() {
                this.t = Math.random() * Math.PI * 2;
                const point = getHeartPoint(this.t);
                this.targetX = point.x + width / 2;
                this.targetY = point.y + height / 2;
                this.x = width / 2;
                this.y = height / 2;
                this.size = Math.random() * 2 + 1;
                this.speed = Math.random() * 0.02 + 0.01;
                this.alpha = Math.random() * 0.5 + 0.5;
                this.color = `rgba(255, ${Math.random() * 50 + 20}, ${Math.random() * 100 + 100}, ${this.alpha})`;
            }

            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;

                // Пульсация
                const pulse = Math.sin(Date.now() * 0.002) * 5;
                this.x += Math.cos(this.t) * pulse * 0.1;
                this.y += Math.sin(this.t) * pulse * 0.1;
            }

            draw() {
                ctx.fillStyle = this.color;
                ctx.shadowBlur = 10;
                ctx.shadowColor = this.color;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctx.fill();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle());
        }

        function animate() {
            ctx.fillStyle = 'rgba(5, 5, 5, 0.2)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });

        animate();
    </script>
</body>
</html>
