<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Nika</title>
    <style>
        * { margin: 0; padding: 0; }
        body { background: #0b0005; overflow: hidden; }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="c"></canvas>

    <script>
        const canvas = document.getElementById("c");
        const ctx = canvas.getContext("2d");

        let width, height, particles = [];
        const TEXT = "НИКА Я ТЕБЯ ЛЮБЛЮ";
        
        // 1. Настройка размера
        function resize() {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        }

        // 2. Математика сердца
        function getHeartPoint(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x: x * 16, y: -y * 16 };
        }

        class Particle {
            constructor(t) {
                this.t = t;
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                this.size = Math.random() * 4 + 10;
                this.speed = 0.02 + Math.random() * 0.03;
                this.opacity = Math.random() * 0.5 + 0.5;
            }

            update() {
                const target = getHeartPoint(this.t);
                const tx = target.x + width / 2;
                const ty = target.y + height / 2;
                
                // Плавное притяжение к форме сердца
                this.x += (tx - this.x) * this.speed;
                this.y += (ty - this.y) * this.speed;

                // Небольшое "дыхание" текста
                this.x += Math.sin(Date.now() * 0.002 + this.t) * 0.5;
                this.y += Math.cos(Date.now() * 0.002 + this.t) * 0.5;
            }

            draw() {
                ctx.fillStyle = `rgba(255, 20, 147, ${this.opacity})`;
                ctx.font = `bold ${this.size}px Arial`;
                ctx.shadowBlur = 8;
                ctx.shadowColor = "#ff1493";
                
                // Отрисовка самого текста вместо точки
                ctx.save();
                ctx.translate(this.x, this.y);
                // Поворачиваем текст, чтобы он "обтекал" форму
                ctx.rotate(this.t + Math.PI / 2); 
                ctx.fillText(TEXT, 0, 0);
                ctx.restore();
            }
        }

        // 3. Создание массива частиц-текста
        function init() {
            particles = [];
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle((i / 100) * Math.PI * 2));
            }
        }

        function animate() {
            ctx.fillStyle = "rgba(11, 0, 5, 0.2)"; // Эффект затухания (шлейф)
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }

        window.addEventListener("resize", () => { resize(); init(); });
        resize();
        init();
        animate();
    </script>
</body>
</html>
