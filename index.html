<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Ники</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #ffc0cb; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #heartStage, #ballStage { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #ballStage { display: none; opacity: 0; transition: opacity 1.5s ease; }
        
        #scene-container {
            position: relative;
            width: 800px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ОБЛАКО: Сверху и справа от шара */
        #cloud-message {
            position: absolute;
            top: 50px;
            right: 50px;
            width: 300px;
            min-height: 150px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.4), inset 0 0 20px rgba(255, 182, 193, 0.5);
            opacity: 0;
            transform: scale(0.5) translateY(50px);
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        #cloud-message::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 50%;
        }

        #cloud-message.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        #prediction-text {
            color: #7d0016;
            font-size: 18px;
            font-weight: 800;
            text-align: center;
            line-height: 1.4;
        }

        .hint { 
            position: absolute;
            bottom: 50px;
            color: #b3001e; 
            font-weight: 900; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            font-size: 14px;
        }
    </style>
</head>
