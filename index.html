<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Ники</title>
    <style>
        body { 
            margin: 0; 
            background-color: #ffc0cb; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        #heartStage {
            position: absolute;
            transition: opacity 1s ease-out;
            width: 100%;
            height: 100%;
        }

        #ballStage {
            display: none;
            opacity: 0;
            text-align: center;
            transition: opacity 1.5s ease-in;
            perspective: 1000px;
        }

        /* --- ГИПЕРРЕАЛИСТИЧНЫЙ ШАР --- */
        .magic-ball {
            width: 320px;
            height: 320px;
            /* Сложный градиент для объема */
            background: radial-gradient(circle at 30% 30%, 
                #ff5f7e 0%, 
                #d90429 40%, 
                #800f2f 85%, 
                #4a0e0e 100%);
            border-radius: 50%;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            box-shadow: 
                0 40px 80px rgba(0,0,0,0.5), 
                inset -20px -20px 60px rgba(0,0,0,0.7),
                inset 20px 20px 40px rgba(255,255,255,0.25);
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            animation: float 4s ease-in-out infinite; /* Эффект левитации */
        }

        /* Блик сверху для эффекта стекла */
        .magic-ball::before {
            content: '';
            position: absolute;
            top: 15%;
            left: 20%;
            width: 80px;
            height: 40px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            filter: blur(10px);
            transform: rotate(-25deg);
        }

        .magic-ball:active { transform: scale(0.9) rotate(5deg); }

        /* Внутреннее окошко с эффектом глубины */
        .ball-window {
            width: 170px;
            height: 170px;
            background: #000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px;
            box-sizing: border-box;
            border: 8px solid #1a1a1a;
            box-shadow: 
                inset 0 0 30px rgba(0,0,0,1),
                0 0 15px rgba(255,0,0,0.2);
            position: relative;
            overflow: hidden;
        }

        /* Текст предсказания */
        #predictionText {
            color: #ffcad4;
            font-size: 16px;
            font-weight: 700;
            text-align: center;
            line-height: 1.4;
            transition: all 0.6s cubic-bezier(0.4, 0, 0.2, 1);
            text-shadow: 0 0 10px rgba(255, 202, 212, 0.8);
            opacity: 1;
        }

        .hint { 
            margin-top: 40px; 
            color: #d90429; 
            font-weight: 800; 
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 0.9rem;
            animation: pulseHint 2s infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        @keyframes pulseHint {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <div id="heartStage">
        <canvas id="heartCanvas"></canvas>
    </div>

    <div id="ballStage">
        <div class="magic-ball" onclick="shakeBall()">
            <div class="ball-window">
                <div id="predictionText">Никуся, прикоснись к магии...</div>
            </div>
        </div>
        <p class="hint">Нажми на шар</p>
    </div>
