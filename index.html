<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Nika</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            background: radial-gradient(circle, #1a0005 0%, #000 100%); 
            overflow: hidden; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            height: 100vh; 
        }
        canvas { display: block; }
    </style>
</head>
<body>
    <canvas id="heartCanvas"></canvas>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');

        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const particles = [];
        const TEXT = "НИКА ЛЮБЛЮ ТЕБЯ";
        const particleCount = 120; // Оптимально, чтобы текст читался и не сливался в кашу

        function getHeartPoint(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x: x * 15, y: -y * 15 };
        }

        class Particle {
            constructor(t) {
                this.t = t;
                this.reset();
            }

            reset() {
                const point = getHeartPoint(this.t);
                this.targetX = point.x + width / 2;
                this.targetY = point.y + height / 2;
                this.x = width / 2 + (Math.random() - 0.5) * 100;
                this.y = height / 2 + (Math.random() - 0.5) * 100;
                this.speed = 0.01 + Math.random() * 0.02;
                this.baseSize = 10 + Math.random() * 5;
                this.opacity = 0.4 + Math.random() * 0.6;
            }

            update() {
                // Движение к цели
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;

                // Пульсация всего сердца
                const pulse = Math.sin(Date.now() * 0.003) * 10;
                const point = getHeartPoint(this.t);
                this.targetX = point.x * (1 + pulse * 0.01) + width / 2;
                this.targetY = point.y * (1 + pulse * 0.01) + height / 2;
            }

            draw() {
                ctx.font = `bold ${this.baseSize}px Arial`;
                ctx.fillStyle = `rgba(255, 20, 147, ${this.opacity})`;
                ctx.shadowBlur = 10;
                ctx.shadowColor = "rgba(255, 20, 147, 0.8)";
                
                // Вращение текста по направлению линии сердца
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.t + Math.PI / 2);
                ctx.fillText(TEXT, 0, 0);
                ctx.restore();
            }
        }

        for (let i = 0; i < particleCount; i++) {
            particles.push(new Particle((i / particleCount) * Math.PI * 2));
        }

        function animate() {
            ctx.fillStyle = 'rgba(0, 0, 0, 0.15)';
            ctx.fillRect(0, 0, width, height);

            particles.forEach(p => {
                p.update();
                p.draw();
            });

            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles.forEach(p => p.reset());
        });

        animate();
    </script>
</body>
</html>
