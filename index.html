<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Ники</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #ffc0cb; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #heartStage, #ballStage { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #ballStage { display: none; opacity: 0; transition: opacity 1.5s ease; flex-direction: column; }
        canvas { display: block; }
        
        #prediction-container {
            position: absolute;
            width: 160px;
            height: 160px;
            pointer-events: none;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
        }

        #prediction-text {
            color: #ffcad4;
            font-size: 15px;
            font-weight: 800;
            text-align: center;
            line-height: 1.3;
            text-shadow: 0 0 10px rgba(255,170,180,0.8);
            opacity: 1;
            transition: opacity 0.4s ease;
        }

        .hint { margin-top: 20px; color: #b3001e; font-weight: 900; letter-spacing: 2px; text-transform: uppercase; font-size: 14px; }
    </style>
</head>
<body>

    <div id="heartStage">
        <canvas id="heartCanvas"></canvas>
    </div>

    <div id="ballStage">
        <div id="three-container" style="width: 350px; height: 350px; position: relative; cursor: pointer;">
            <div id="prediction-container">
                <div id="prediction-text">Никуся, нажми на шар</div>
            </div>
        </div>
        <p class="hint">Твой магический шар</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const phrases = [
            "Никусь, ты самая шикарная)",
            "Никусь, ты самая самая красивая",
            "Дорогая моя Вероника, ты самая лучшая в мире",
            "Никуся, ты сегодня лучше, чем вчера, а завтра будешь лучше, чем сегодня)",
            "Ника, ты прям сияешь",
            "Никуся, лучше тебя никого не бывает",
            "Улыбайся почаще, моя дорогая",
            "Никуся, ты самая идеальная в мире",
            "Никуся, ты прям как космос - это выше небес",
            "Никуся, ты бесценна"
        ];

        // --- ЛОГИКА СЕРДЦА (2D) ---
        const hCanvas = document.getElementById('heartCanvas');
        const hCtx = hCanvas.getContext('2d');
        let hWidth = hCanvas.width = window.innerWidth;
        let hHeight = hCanvas.height = window.innerHeight;

        function getHeartPoint(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x: x * 15, y: -y * 15 };
        }

        class Particle {
            constructor(t) {
                this.t = t;
                this.x = Math.random() * hWidth;
                this.y = Math.random() * hHeight;
                const target = getHeartPoint(this.t);
                this.targetX = target.x + hWidth / 2;
                this.targetY = target.y + hHeight / 2;
                this.speed = 0.01 + Math.random() * 0.02;
            }
            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
            }
            draw() {
                hCtx.font = "bold 14px sans-serif";
                hCtx.fillStyle = "#ff0000";
                hCtx.textAlign = "center";
                hCtx.fillText("Ника, я тебя люблю", this.x, this.y);
            }
        }

        const particles = [];
        for (let i = 0; i < 100; i++) particles.push(new Particle((i / 100) * Math.PI * 2));

        function animateHeart() {
            if (document.getElementById('heartStage').style.display === 'none') return;
            hCtx.fillStyle = "#ffc0cb";
            hCtx.fillRect(0, 0, hWidth, hHeight);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateHeart);
        }
        animateHeart();

        // --- ПЕРЕХОД ---
        setTimeout(() => {
            const hStage = document.getElementById('heartStage');
            const bStage = document.getElementById('ballStage');
            hStage.style.opacity = '0';
            setTimeout(() => {
                hStage.style.display = 'none';
                bStage.style.display = 'flex';
                setTimeout(() => { bStage.style.opacity = '1'; init3DBall(); }, 50);
            }, 1000);
        }, 5000);

        // --- ЛОГИКА 3D ШАРА (Three.js) ---
        function init3DBall() {
            const container = document.getElementById('three-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(75, 1, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(350, 350);
            container.appendChild(renderer.domElement);

            // Создаем геометрию сферы
            const geometry = new THREE.SphereGeometry(1.5, 64, 64);
            const material = new THREE.MeshPhongMaterial({
                color: 0x800000,
                specular: 0x666666,
                shininess: 100,
                transparent: true,
                opacity: 0.9
            });
            const ball = new THREE.Mesh(geometry, material);
            scene.add(ball);

            // Освещение
            const light = new THREE.PointLight(0xffffff, 1, 100);
            light.position.set(5, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            camera.position.z = 4;

            function animate() {
                requestAnimationFrame(animate);
                ball.rotation.y += 0.005; // Медленное вращение
                renderer.render(scene, camera);
            }
            animate();

            // Тряска при клике
            container.onclick = () => {
                const textElem = document.getElementById('prediction-text');
                textElem.style.opacity = '0';
                
                // Эффект физической встряски объекта Three.js
                let startTime = Date.now();
                function shake() {
                    let elapsed = Date.now() - startTime;
                    if (elapsed < 500) {
                        ball.position.x = Math.sin(elapsed * 0.1) * 0.1;
                        requestAnimationFrame(shake);
                    } else {
                        ball.position.x = 0;
                        textElem.innerText = phrases[Math.floor(Math.random() * phrases.length)];
                        textElem.style.opacity = '1';
                    }
                }
                shake();
            };
        }
    </script>
</body>
</html>
