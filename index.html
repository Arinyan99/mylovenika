<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Ники</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #ffc0cb; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #heartStage, #ballStage { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #ballStage { display: none; opacity: 0; transition: opacity 1.5s ease; }
        
        #scene-container {
            position: relative;
            width: 800px;
            height: 600px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* ОБЛАКО: Сверху и справа от шара */
        #cloud-message {
            position: absolute;
            top: 50px;
            right: 50px;
            width: 300px;
            min-height: 150px;
            background: rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            box-shadow: 0 0 40px rgba(255, 255, 255, 0.4), inset 0 0 20px rgba(255, 182, 193, 0.5);
            opacity: 0;
            transform: scale(0.5) translateY(50px);
            transition: all 1s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 100;
        }

        #cloud-message::after {
            content: '';
            position: absolute;
            bottom: -20px;
            left: 20px;
            width: 40px;
            height: 40px;
            background: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(10px);
            border-radius: 50%;
        }

        #cloud-message.visible {
            opacity: 1;
            transform: scale(1) translateY(0);
        }

        #prediction-text {
            color: #7d0016;
            font-size: 18px;
            font-weight: 800;
            text-align: center;
            line-height: 1.4;
        }

        .hint { 
            position: absolute;
            bottom: 50px;
            color: #b3001e; 
            font-weight: 900; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            font-size: 14px;
        }
    </style>
</head>
<body>

    <div id="heartStage">
        <canvas id="heartCanvas"></canvas>
    </div>

    <div id="ballStage">
        <div id="scene-container">
            <div id="three-canvas-container"></div>
            
            <div id="cloud-message">
                <div id="prediction-text">Никуся, нажми на шар...</div>
            </div>
            
            <p class="hint">Встряхни шар, чтобы увидеть мысли</p>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const phrases = [
            "Никусь, ты самая шикарная)",
            "Никусь, ты самая самая красивая",
            "Дорогая моя Вероника, ты самая лучшая в мире",
            "Никуся, ты сегодня лучше, чем вчера, а завтра будешь лучше, чем сегодня)",
            "Ника, ты прям сияешь",
            "Никуся, лучше тебя никого не бывает",
            "Улыбайся почаще, моя дорогая",
            "Никуся, ты самая идеальная в мире",
            "Никуся, ты прям как космос - это выше небес",
            "Никуся, ты бесценна"
        ];

        // --- ЛОГИКА СЕРДЦА ---
        const hCanvas = document.getElementById('heartCanvas');
        const hCtx = hCanvas.getContext('2d');
        let hWidth = hCanvas.width = window.innerWidth;
        let hHeight = hCanvas.height = window.innerHeight;

        function getHeartPoint(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x: x * 15, y: -y * 15 };
        }

        class Particle {
            constructor(t) {
                this.t = t;
                this.x = Math.random() * hWidth;
                this.y = Math.random() * hHeight;
                const target = getHeartPoint(this.t);
                this.targetX = target.x + hWidth / 2;
                this.targetY = target.y + hHeight / 2;
                this.speed = 0.01 + Math.random() * 0.02;
            }
            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
            }
            draw() {
                hCtx.font = "bold 14px sans-serif";
                hCtx.fillStyle = "#ff0000";
                hCtx.textAlign = "center";
                hCtx.fillText("Ника, я тебя люблю", this.x, this.y);
            }
        }

        const particles = [];
        for (let i = 0; i < 100; i++) particles.push(new Particle((i / 100) * Math.PI * 2));

        function animateHeart() {
            if (document.getElementById('heartStage').style.display === 'none') return;
            hCtx.fillStyle = "#ffc0cb";
            hCtx.fillRect(0, 0, hWidth, hHeight);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateHeart);
        }
        animateHeart();

        setTimeout(() => {
            const hStage = document.getElementById('heartStage');
            const bStage = document.getElementById('ballStage');
            hStage.style.opacity = '0';
            setTimeout(() => {
                hStage.style.display = 'none';
                bStage.style.display = 'flex';
                setTimeout(() => { bStage.style.opacity = '1'; init3D(); }, 50);
            }, 1000);
        }, 5000);

        // --- 3D И ОБЛАКО ---
        function init3D() {
            const container = document.getElementById('three-canvas-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(45, 1, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(400, 400);
            container.appendChild(renderer.domElement);

            // Шар
            const geometry = new THREE.SphereGeometry(2, 64, 64);
            const material = new THREE.MeshPhongMaterial({
                color: 0x900000,
                specular: 0x666666,
                shininess: 100,
                emissive: 0x220000
            });
            const ball = new THREE.Mesh(geometry, material);
            scene.add(ball);

            // Освещение
            const light = new THREE.PointLight(0xffffff, 1.2);
            light.position.set(5, 5, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            camera.position.z = 6;

            function animate() {
                requestAnimationFrame(animate);
                ball.rotation.y += 0.005;
                renderer.render(scene, camera);
            }
            animate();

            // Клик
            container.style.cursor = "pointer";
            container.onclick = () => {
                const cloud = document.getElementById('cloud-message');
                const text = document.getElementById('prediction-text');
                
                cloud.classList.remove('visible');
                
                // Тряска шара
                let start = Date.now();
                function shake() {
                    let elapsed = Date.now() - start;
                    if (elapsed < 500) {
                        ball.position.x = Math.sin(elapsed * 0.1) * 0.1;
                        requestAnimationFrame(shake);
                    } else {
                        ball.position.x = 0;
                        text.innerText = phrases[Math.floor(Math.random() * phrases.length)];
                        cloud.classList.add('visible');
                    }
                }
                shake();
            };
        }
    </script>
</body>
</html>
