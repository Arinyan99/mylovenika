<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Ники</title>
    <style>
        body { 
            margin: 0; 
            background-color: #ffc0cb; 
            overflow: hidden; 
            display: flex; 
            flex-direction: column;
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            font-family: 'Segoe UI', Roboto, sans-serif;
        }

        #heartStage {
            position: absolute;
            transition: opacity 1s ease-out;
            width: 100%;
            height: 100%;
        }

        #ballStage {
            display: none;
            opacity: 0;
            text-align: center;
            transition: opacity 1.5s ease-in;
            z-index: 10;
        }

        /* Улучшенный дизайн магического шара */
        .magic-ball {
            width: 280px;
            height: 280px;
            background: radial-gradient(circle at 35% 35%, #ff4d6d, #b91d1d 50%, #7f1d1d 100%);
            border-radius: 50%;
            box-shadow: 
                0 30px 60px rgba(0,0,0,0.4), 
                inset -15px -15px 50px rgba(0,0,0,0.6),
                inset 15px 15px 30px rgba(255,255,255,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            position: relative;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            user-select: none;
        }

        .magic-ball:active { transform: scale(0.92); }

        .ball-window {
            width: 160px;
            height: 160px;
            background: radial-gradient(circle, #262626 0%, #0a0a0a 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            border: 6px solid #1f1f1f;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.8);
        }

        #predictionText {
            color: #ffcad4;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            line-height: 1.4;
            transition: opacity 0.4s ease;
            text-shadow: 0 0 8px rgba(255, 202, 212, 0.5);
        }

        .hint { 
            margin-top: 30px; 
            color: #b91d1d; 
            font-weight: 700; 
            letter-spacing: 1px;
            text-transform: uppercase;
            font-size: 0.85rem;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.3);
        }
    </style>
</head>
<body>

    <div id="heartStage">
        <canvas id="heartCanvas"></canvas>
    </div>

    <div id="ballStage">
        <div class="magic-ball" onclick="shakeBall()">
            <div class="ball-window">
                <div id="predictionText">Никуся, нажми на шар</div>
            </div>
        </div>
        <p class="hint">Узнай, что я думаю о тебе сегодня</p>
    </div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const phrases = [
            "Никусь, ты самая шикарная)",
            "Никусь, ты самая самая красивая",
            "Дорогая моя Вероника, ты самая лучшая в мире",
            "Никуся, ты сегодня лучше, чем вчера, а завтра будешь лучше, чем сегодня)",
            "Ника, ты прям сияешь",
            "Никуся, лучше тебя никого не бывает",
            "Улыбайся почаще, моя дорогая",
            "Никуся, ты самая идеальная в мире",
            "Никуся, ты прям как космос - это выше небес",
            "Никуся, ты бесценна"
        ];

        function getHeartPoint(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x: x * 15, y: -y * 15 };
        }

        class Particle {
            constructor(t) {
                this.t = t;
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                const target = getHeartPoint(this.t);
                this.targetX = target.x + width / 2;
                this.targetY = target.y + height / 2;
                this.speed = 0.01 + Math.random() * 0.02;
            }
            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
                this.x += Math.sin(Date.now() * 0.002 + this.t) * 0.2;
                this.y += Math.cos(Date.now() * 0.002 + this.t) * 0.2;
            }
            draw() {
                ctx.font = "bold 14px sans-serif";
                ctx.fillStyle = "#ff0000";
                ctx.textAlign = "center";
                ctx.fillText("Ника, я тебя люблю", this.x, this.y);
            }
        }

        const particles = [];
        for (let i = 0; i < 100; i++) particles.push(new Particle((i / 100) * Math.PI * 2));

        function animateHeart() {
            ctx.fillStyle = "#ffc0cb";
            ctx.fillRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateHeart);
        }
        animateHeart();

        // Переход через 4.5 секунды
        setTimeout(() => {
            const hStage = document.getElementById('heartStage');
            const bStage = document.getElementById('ballStage');
            hStage.style.opacity = '0';
            setTimeout(() => {
                hStage.style.display = 'none';
                bStage.style.display = 'block';
                setTimeout(() => { bStage.style.opacity = '1'; }, 50);
            }, 1000);
        }, 4500);

        function shakeBall() {
            const textElem = document.getElementById('predictionText');
            textElem.style.opacity = '0';
            
            setTimeout(() => {
                const randomPhrase = phrases[Math.floor(Math.random() * phrases.length)];
                textElem.innerText = randomPhrase;
                textElem.style.opacity = '1';
            }, 400);
        }

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
            particles.forEach((p, i) => {
                const target = getHeartPoint((i / 100) * Math.PI * 2);
                p.targetX = target.x + width / 2;
                p.targetY = target.y + height / 2;
            });
        });
    </script>
</body>
</html>
