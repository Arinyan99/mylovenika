<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Ники</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #ffc0cb; overflow: hidden; font-family: 'Segoe UI', sans-serif; }
        #heartStage, #ballStage { position: absolute; width: 100%; height: 100%; display: flex; justify-content: center; align-items: center; }
        #ballStage { display: none; opacity: 0; transition: opacity 1.5s ease; flex-direction: column; }
        
        #three-container {
            width: 380px; 
            height: 380px; 
            position: relative; 
            cursor: pointer;
            filter: drop-shadow(0 20px 50px rgba(0,0,0,0.3));
        }

        /* Оверлей для текста теперь жестко привязан к центру окошка */
        #prediction-overlay {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 150px;
            height: 150px;
            display: flex;
            justify-content: center;
            align-items: center;
            pointer-events: none;
            z-index: 100;
        }

        #prediction-text {
            color: #fff1f2;
            font-size: 16px;
            font-weight: 800;
            text-align: center;
            line-height: 1.3;
            text-shadow: 0 0 15px rgba(255, 100, 150, 0.9), 0 0 5px rgba(255, 255, 255, 0.5);
            transition: opacity 0.5s cubic-bezier(0.4, 0, 0.2, 1), transform 0.5s ease;
            opacity: 1;
        }

        .hint { 
            margin-top: 30px; 
            color: #b3001e; 
            font-weight: 900; 
            letter-spacing: 2px; 
            text-transform: uppercase; 
            font-size: 14px;
            text-shadow: 1px 1px 0px rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>

    <div id="heartStage">
        <canvas id="heartCanvas"></canvas>
    </div>

    <div id="ballStage">
        <div id="three-container">
            <div id="prediction-overlay">
                <div id="prediction-text">Никуся, прикоснись к шару</div>
            </div>
        </div>
        <p class="hint">Твой магический шар</p>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

    <script>
        const phrases = [
            "Никусь, ты самая шикарная)",
            "Никусь, ты самая самая красивая",
            "Дорогая моя Вероника, ты самая лучшая в мире",
            "Никуся, ты сегодня лучше, чем вчера, а завтра будешь лучше, чем сегодня)",
            "Ника, ты прям сияешь",
            "Никуся, лучше тебя никого не бывает",
            "Улыбайся почаще, моя дорогая",
            "Никуся, ты самая идеальная в мире",
            "Никуся, ты прям как космос - это выше небес",
            "Никуся, ты бесценна"
        ];

        // --- ЛОГИКА СЕРДЦА ---
        const hCanvas = document.getElementById('heartCanvas');
        const hCtx = hCanvas.getContext('2d');
        let hWidth = hCanvas.width = window.innerWidth;
        let hHeight = hCanvas.height = window.innerHeight;

        function getHeartPoint(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x: x * 15, y: -y * 15 };
        }

        class Particle {
            constructor(t) {
                this.t = t;
                this.x = Math.random() * hWidth;
                this.y = Math.random() * hHeight;
                const target = getHeartPoint(this.t);
                this.targetX = target.x + hWidth / 2;
                this.targetY = target.y + hHeight / 2;
                this.speed = 0.01 + Math.random() * 0.02;
            }
            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
            }
            draw() {
                hCtx.font = "bold 14px sans-serif";
                hCtx.fillStyle = "#ff0000";
                hCtx.textAlign = "center";
                hCtx.fillText("Ника, я тебя люблю", this.x, this.y);
            }
        }

        const particles = [];
        for (let i = 0; i < 100; i++) particles.push(new Particle((i / 100) * Math.PI * 2));

        function animateHeart() {
            if (document.getElementById('heartStage').style.display === 'none') return;
            hCtx.fillStyle = "#ffc0cb";
            hCtx.fillRect(0, 0, hWidth, hHeight);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateHeart);
        }
        animateHeart();

        // --- ПЕРЕХОД ---
        setTimeout(() => {
            const hStage = document.getElementById('heartStage');
            const bStage = document.getElementById('ballStage');
            hStage.style.opacity = '0';
            setTimeout(() => {
                hStage.style.display = 'none';
                bStage.style.display = 'flex';
                setTimeout(() => { bStage.style.opacity = '1'; init3DBall(); }, 50);
            }, 1000);
        }, 5000);

        // --- 3D ШАР ---
        function init3DBall() {
            const container = document.getElementById('three-container');
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(50, 1, 0.1, 1000);
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(380, 380);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Группа для шара (тело + окошко)
            const ballGroup = new THREE.Group();
            
            // Основное тело (темно-красный пластик/стекло)
            const bodyGeom = new THREE.SphereGeometry(1.8, 64, 64);
            const bodyMat = new THREE.MeshPhongMaterial({
                color: 0x660000,
                specular: 0x992222,
                shininess: 100,
                emissive: 0x220000
            });
            const body = new THREE.Mesh(bodyGeom, bodyMat);
            ballGroup.add(body);

            // Окошко (черный диск)
            const windowGeom = new THREE.CircleGeometry(0.9, 64);
            const windowMat = new THREE.MeshBasicMaterial({ color: 0x050505 });
            const windowMesh = new THREE.Mesh(windowGeom, windowMat);
            windowMesh.position.z = 1.71; // Чуть выступает над поверхностью
            ballGroup.add(windowMesh);

            scene.add(ballGroup);

            // Свет
            const topLight = new THREE.DirectionalLight(0xffffff, 1.2);
            topLight.position.set(5, 5, 10);
            scene.add(topLight);

            const ambient = new THREE.AmbientLight(0x404040, 0.5);
            scene.add(ambient);

            camera.position.z = 6;

            function animate() {
                requestAnimationFrame(animate);
                ballGroup.rotation.y = Math.sin(Date.now() * 0.001) * 0.1; // Легкое покачивание
                ballGroup.rotation.x = Math.cos(Date.now() * 0.001) * 0.05;
                renderer.render(scene, camera);
            }
            animate();

            // Тряска и смена текста
            let isShaking = false;
            container.onclick = () => {
                if (isShaking) return;
                isShaking = true;
                
                const textElem = document.getElementById('prediction-text');
                textElem.style.opacity = '0';
                textElem.style.transform = 'translateY(10px) scale(0.9)';

                let start = Date.now();
                function shake() {
                    let elapsed = Date.now() - start;
                    if (elapsed < 600) {
                        ballGroup.position.x = Math.sin(elapsed * 0.05) * 0.15;
                        ballGroup.position.y = Math.cos(elapsed * 0.05) * 0.15;
                        requestAnimationFrame(shake);
                    } else {
                        ballGroup.position.set(0,0,0);
                        textElem.innerText = phrases[Math.floor(Math.random() * phrases.length)];
                        textElem.style.opacity = '1';
                        textElem.style.transform = 'translateY(0) scale(1)';
                        isShaking = false;
                    }
                }
                shake();
            };
        }
    </script>
</body>
</html>
