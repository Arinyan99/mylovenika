<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Для Ники</title>
    <style>
        body { 
            margin: 0; 
            background-color: #ffc0cb; 
            overflow: hidden; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh;
            font-family: 'Segoe UI', sans-serif;
        }

        /* Контейнеры */
        #heartStage, #ballStage {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        #ballStage {
            display: none;
            opacity: 0;
            transition: opacity 1s ease-in;
        }

        /* ГИПЕРРЕАЛИСТИЧНЫЙ ШАР */
        .ball-container {
            position: relative;
            width: 320px;
            height: 320px;
            animation: levitate 4s ease-in-out infinite;
        }

        .magic-ball {
            width: 100%;
            height: 100%;
            background: radial-gradient(circle at 35% 35%, 
                #ff7b92 0%, 
                #e60026 30%, 
                #8b001a 70%, 
                #4d000e 100%);
            border-radius: 50%;
            position: relative;
            box-shadow: 
                0 50px 100px rgba(0,0,0,0.5), 
                inset -25px -25px 60px rgba(0,0,0,0.8),
                inset 20px 20px 50px rgba(255,255,255,0.3);
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 2;
        }

        /* Стеклянный блик */
        .glass-glare {
            position: absolute;
            top: 10%;
            left: 15%;
            width: 120px;
            height: 60px;
            background: linear-gradient(to bottom, rgba(255,255,255,0.4), rgba(255,255,255,0));
            border-radius: 50%;
            transform: rotate(-25deg);
            filter: blur(8px);
            pointer-events: none;
            z-index: 3;
        }

        .magic-ball:active { transform: scale(0.92); }

        .ball-window {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #1a1a1a 0%, #000 100%);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 25px;
            box-sizing: border-box;
            border: 6px solid #111;
            box-shadow: inset 0 0 40px rgba(0,0,0,1);
        }

        #predictionText {
            color: #ffcad4;
            font-size: 16px;
            font-weight: bold;
            text-align: center;
            line-height: 1.4;
            text-shadow: 0 0 10px rgba(255,170,180,0.6);
            transition: opacity 0.4s;
        }

        .hint { 
            margin-top: 40px; 
            color: #b3001e; 
            font-weight: bold; 
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 14px;
        }

        @keyframes levitate {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>

    <div id="heartStage">
        <canvas id="heartCanvas"></canvas>
    </div>

    <div id="ballStage">
        <div class="ball-container">
            <div class="glass-glare"></div>
            <div class="magic-ball" onclick="shakeBall()">
                <div class="ball-window">
                    <div id="predictionText">Никуся, нажми на шар</div>
                </div>
            </div>
        </div>
        <p class="hint">Узнай мои мысли о тебе</p>
    </div>

    <script>
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let width = canvas.width = window.innerWidth;
        let height = canvas.height = window.innerHeight;

        const phrases = [
            "Никусь, ты самая шикарная)",
            "Никусь, ты самая самая красивая",
            "Дорогая моя Вероника, ты самая лучшая в мире",
            "Никуся, ты сегодня лучше, чем вчера, а завтра будешь лучше, чем сегодня)",
            "Ника, ты прям сияешь",
            "Никуся, лучше тебя никого не бывает",
            "Улыбайся почаще, моя дорогая",
            "Никуся, ты самая идеальная в мире",
            "Никуся, ты прям как космос - это выше небес",
            "Никуся, ты бесценна"
        ];

        // --- СЕРДЦЕ ---
        function getHeartPoint(t) {
            let x = 16 * Math.pow(Math.sin(t), 3);
            let y = 13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t);
            return { x: x * 15, y: -y * 15 };
        }

        class Particle {
            constructor(t) {
                this.t = t;
                this.x = Math.random() * width;
                this.y = Math.random() * height;
                const target = getHeartPoint(this.t);
                this.targetX = target.x + width / 2;
                this.targetY = target.y + height / 2;
                this.speed = 0.01 + Math.random() * 0.02;
            }
            update() {
                this.x += (this.targetX - this.x) * this.speed;
                this.y += (this.targetY - this.y) * this.speed;
                this.x += Math.sin(Date.now() * 0.002 + this.t) * 0.3;
                this.y += Math.cos(Date.now() * 0.002 + this.t) * 0.3;
            }
            draw() {
                ctx.font = "bold 14px sans-serif";
                ctx.fillStyle = "#ff0000";
                ctx.textAlign = "center";
                ctx.fillText("Ника, я тебя люблю", this.x, this.y);
            }
        }

        const particles = [];
        for (let i = 0; i < 100; i++) particles.push(new Particle((i / 100) * Math.PI * 2));

        function animate() {
            ctx.fillStyle = "#ffc0cb";
            ctx.fillRect(0, 0, width, height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // --- ПЕРЕХОД ---
        setTimeout(() => {
            const hStage = document.getElementById('heartStage');
            const bStage = document.getElementById('ballStage');
            hStage.style.transition = "opacity 1s";
            hStage.style.opacity = "0";
            
            setTimeout(() => {
                hStage.style.display = "none";
                bStage.style.display = "flex";
                setTimeout(() => { bStage.style.opacity = "1"; }, 50);
            }, 1000);
        }, 5000);

        // --- ШАР ---
        function shakeBall() {
            const textElem = document.getElementById('predictionText');
            textElem.style.opacity = "0";
            setTimeout(() => {
                textElem.innerText = phrases[Math.floor(Math.random() * phrases.length)];
                textElem.style.opacity = "1";
            }, 400);
        }

        window.addEventListener('resize', () => {
            width = canvas.width = window.innerWidth;
            height = canvas.height = window.innerHeight;
        });
    </script>
</body>
</html>
